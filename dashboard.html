<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            color: #2d2d2d;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-info h2 {
            margin-right: 20px;
            color: #667eea;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .welcome-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .welcome-section p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .add-post-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .posts-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .posts-section h3 {
            margin-bottom: 20px;
            color: #2d2d2d;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .post-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .post-card h4 {
            color: #2d2d2d;
            margin-bottom: 10px;
        }

        .post-card p {
            color: #666;
            line-height: 1.6;
        }

        .post-meta {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        #dialogue-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        #dialogue-box h2 {
            margin-bottom: 20px;
            color: #2d2d2d;
            text-align: center;
        }

        #dialogue-box input,
        #dialogue-box textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #dialogue-box input:focus,
        #dialogue-box textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        #dialogue-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }

        #dialogue-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }

            .user-info {
                margin-bottom: 15px;
            }

            .welcome-section {
                padding: 20px;
            }

            .posts-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="user-info">
                <h2>Hi <span id="user-name"></span></h2>
                <button id="logout" class="logout-btn">Logout</button>
            </div>
        </div>

        <div class="welcome-section">
            <p>Welcome to your dashboard!</p>
            <button id="add-post" class="add-post-btn">Add New Post</button>
        </div>

        <div class="posts-section">
            <h3>Your Posts</h3>
            <div id="posts-container">
                <!-- Posts will be displayed here -->
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="dialogue-box">
        <h2>Create New Post</h2>
        <input type="text" id="title" placeholder="Post Title" required>
        <textarea id="content" placeholder="Post Content" rows="5" required></textarea>
        <button id="submit">Submit Post</button>
    </div>

    <script src="work.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
