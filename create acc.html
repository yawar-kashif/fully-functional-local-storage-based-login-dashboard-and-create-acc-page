<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Document</title>
    <style>
       
  /* same base rules as login-style.css – kept together for reuse */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    display: flex;
    width: 100%;
    max-width: 1200px;
    height: 700px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
}

.login-box {
    flex: 1;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.logo {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 30px;
    color: white;
    margin-top: 30px;
}

.login-header h1 {
    font-size: 28px;
    color: #2d2d2d;
    margin-bottom: 6px;
}

.login-header p {
    color: #888;
    font-size: 14px;
    
}

.login-form {
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    color: #333;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: #f5f5f5;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    transition: all 0.3s ease;
}

.input-wrapper:focus-within {
    border-color: #667eea;
    background: #fafafa;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-wrapper i {
    padding: 0 15px;
    color: #667eea;
    font-size: 16px;
}

.input-wrapper input {
    flex: 1;
    padding: 12px 0;
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    color: #333;
}

.input-wrapper input::placeholder {
    color: #aaa;
}

#togglePassword {
    cursor: pointer;
    padding: 0 15px;
    color: #667eea;
    font-size: 16px;
    background: none;
    border: none;
    transition: color 0.3s;
    color: #666;
}

#togglePassword:hover {
    color: #667eea;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    font-size: 13px;
}

.remember-me {
    display: flex;
    align-items: center;
    cursor: pointer;
    color: #555;
}

.remember-me input {
    margin-right: 8px;
    cursor: pointer;
}

.forgot-password {
    color: #667eea;
    text-decoration: none;
    transition: color 0.3s;
}

.forgot-password:hover {
    color: #764ba2;
    text-decoration: underline;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 20px;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}

.login-footer {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-top: -40px;
}

.signup-link {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
}

.signup-link:hover {
    color: #764ba2;
    text-decoration: underline;
}

.login-side {
    flex: 1;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 60px 40px;
}

.side-content {
    text-align: center;
}

.side-content h2 {
    font-size: 32px;
    margin-bottom: 20px;
}

.side-content p {
    font-size: 16px;
    opacity: 0.9;
    line-height: 1.6;
}

/* Responsive Design */
@media (max-width: 768px) {
    .login-container {
        flex-direction: column;
        height: auto;
    }

    .login-side {
        display: none;
    }

    .login-box {
        padding: 40px 30px;
    }

    .login-header h1 {
        font-size: 24px;
    }
}
    </style>
</head>
<body>


   
        <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Create Account</h1>
                <p>Enter your details to get started</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label for="name">Full name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="num">Mobile number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="num" placeholder="+1‑123‑456‑7890" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pass">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="pass" placeholder="Create a password" required>
                        <button type="button" id="togglePassword" class="fas fa-eye-slash"></button>
                    </div>
                </div>

                <button type="button" id="btn" class="login-btn">Create account</button>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="login page.html" class="signup-link">Sign in</a></p>
            </div>
        </div>

        <div class="login-side">
            <div class="side-content">
                <h2>Join us today</h2>
                <p>Create an account and enjoy secure, personalised access.</p>
            </div>
        </div>
    </div>



        <script src="work.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </div>
    </body>
    </html>
